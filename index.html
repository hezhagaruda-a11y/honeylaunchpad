<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey Launchpad</title>
  <script type="module" src="index.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: white;
      --text: #111;
      --accent: #4caf50;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --text: #f0f0f0;
      --accent: #4caf50;
    }
    body {
      font-family: Arial;
      background: var(--bg);
      background-image:
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%);
      background-size: 58px 33px;
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      transition: background 0.3s;
    }
    .card {
      background: var(--card-bg);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .card {
      border: 1px solid #333;
    }
    button {
      padding: 18px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 22px;
      width: 100%;
      transition: all 0.2s ease;
    }
    .action-card {
      background: linear-gradient(135deg, #ffeb3b, #ffc107);
      color: #111;
      padding: 18px 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
    }
    .action-card:hover {
      transform: scale(1.03);
    }
    .theme-toggle {
      padding: 10px 12px;
      font-size: 22px;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
    }
    [data-theme="dark"] .theme-toggle {
      background: white;
      color: #111;
    }
  </style>
</head>
<body>
  <!-- Dark Mode Toggle -->
  <div style="position: fixed; top: 15px; right: 15px; z-index: 100;">
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>

  <h1>🍯 Honey Launchpad</h1>

  <!-- 1. Acquire Investor NFT -->
  <div onclick="window.location.href='acquire-nft.html'" class="action-card">
    <h2 style="margin:0; font-size:22px;">🏆 Acquire Investor NFT</h2>
    <p style="margin:6px 0 0 0; font-size:14px; opacity:0.9;">Mint Bronze / Silver / Gold tiers</p>
  </div>

  <!-- 2. Spark DEX • Buy HONEY -->
  <div onclick="window.location.href='spark-dex.html'" class="action-card" style="background: linear-gradient(135deg, #ff9800, #f57c00);">
    <h2 style="margin:0; font-size:22px;">🔥 Spark DEX • Buy HONEY</h2>
    <p style="margin:6px 0 0 0; font-size:14px; opacity:0.9;">Real swaps • Live price discovery</p>
  </div>

  <!-- 3. Protocol Traffic (Public) -->
  <div onclick="window.location.href='traffic.html'" class="action-card" style="background: linear-gradient(135deg, #00bcd4, #009688); color: white;">
    <h2 style="margin:0; font-size:22px;">📡 Protocol Traffic</h2>
    <p style="margin:6px 0 0 0; font-size:14px; opacity:0.9;">Live DEX &amp; IDO activity • Open to all</p>
  </div>

  <!-- 4. Leaderboard (NFT Gated) -->
  <div onclick="window.location.href='leaderboard.html'" class="action-card" style="background: linear-gradient(135deg, #9c27b0, #673ab7); color: white;">
    <h2 style="margin:0; font-size:22px;">🏆 Leaderboard</h2>
    <p style="margin:6px 0 0 0; font-size:14px; opacity:0.9;">Top HONEY holders • Investor Tier shown</p>
  </div>

  <!-- 5. Connect Treasury -->
  <div class="card">
    <button id="connectBtn" style="background: #111; color: white;">
      👑 Connect Treasury
    </button>
  </div>

  <div id="walletInfo" class="card" style="display:none;">
    <strong>Connected as:</strong> <span id="wallet"></span>
    <br><strong>Investor Tier:</strong> <span id="tier"></span>
  </div>

  <div id="pools"></div>
  <div id="purchases"></div>
</body>
</html>
