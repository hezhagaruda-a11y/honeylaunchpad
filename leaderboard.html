<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey Launchpad • Leaderboard</title>
  <script type="module" src="leaderboard.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: white;
      --text: #111;
      --accent: #4caf50;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --text: #f0f0f0;
      --accent: #4caf50;
    }
    body { 
      font-family: Arial; 
      background: var(--bg);
      background-image: 
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%);
      background-size: 58px 33px;
      color: var(--text); 
      padding: 20px; 
      margin: 0;
      min-height: 100vh;
      transition: background 0.3s;
    }
    .card { 
      background: var(--card-bg); 
      padding: 24px; 
      margin-bottom: 24px; 
      border-radius: 16px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.08); 
      overflow-x: auto;
    }
    [data-theme="dark"] .card {
      border: 1px solid #333;
    }
    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      font-size: 15.5px;
      white-space: nowrap;
    }
    [data-theme="dark"] th, [data-theme="dark"] td {
      border-bottom: 1px solid #444;
    }
    th {
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    .rank {
      font-weight: bold;
      width: 44px;
      text-align: center;
      font-size: 17px;
    }
    .current-user {
      background: #fff7e6;
      font-weight: 600;
    }
    [data-theme="dark"] .current-user {
      background: #332200;
    }
    .wallet {
      font-family: monospace;
      font-size: 15px;
    }
    .tier {
      font-weight: bold;
    }
    .bronze { color: #cd7f32; }
    .silver { color: #c0c0c0; }
    .gold   { color: #ffd700; }
    .theme-toggle {
      padding: 10px 12px;
      font-size: 22px;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
    }
    [data-theme="dark"] .theme-toggle {
      background: white;
      color: #111;
    }
  </style>
</head>
<body>
  <!-- Dark Mode Toggle -->
  <div style="position: fixed; top: 15px; right: 15px; z-index: 100;">
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>

  <h1>🏆 Honey Launchpad Leaderboard</h1>
  <p style="color: var(--text); opacity: 0.85; margin-bottom:24px; font-weight: 500;">
    Top HONEY holders by balance • Investor Tier shown
  </p>

  <div class="card">
    <table id="leaderboardTable">
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Wallet</th>
          <th>HONEY</th>
          <th>Tier</th>
          <th>NFTs</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <!-- Filled by JavaScript -->
      </tbody>
    </table>
  </div>

  <button onclick="loadLeaderboard()" style="width:100%; padding:16px; font-size:17px;">🔄 Refresh Leaderboard</button>

  <p style="text-align:center; margin-top:30px; color: var(--text); opacity: 0.7; font-size:0.95em;">
    Only wallets that have interacted with the protocol are shown.<br>
    The game is just beginning.
  </p>

  <script>
    document.getElementById("themeToggle").onclick = () => {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      const newTheme = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", newTheme);
      localStorage.setItem("theme", newTheme);
    };
  </script>
</body>
</html>
