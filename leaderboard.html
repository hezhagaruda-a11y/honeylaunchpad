<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey Launchpad • Leaderboard</title>
  <script type="module" src="leaderboard.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: white;
      --text: #111;
      --accent: #4caf50;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --text: #f0f0f0;
      --accent: #4caf50;
    }
    body { 
      font-family: Arial; 
      background: var(--bg);
      background-image: 
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%);
      background-size: 58px 33px;
      color: var(--text); 
      padding: 20px; 
      margin: 0;
      min-height: 100vh;
    }
    .card { 
      background: var(--card-bg); 
      padding: 20px; 
      margin-bottom: 20px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    [data-theme="dark"] th, [data-theme="dark"] td {
      border-bottom: 1px solid #444;
    }
    .rank {
      font-weight: bold;
      width: 40px;
    }
    .tier {
      font-weight: bold;
    }
    .bronze { color: #cd7f32; }
    .silver { color: #c0c0c0; }
    .gold   { color: #ffd700; }
  </style>
</head>
<body>
  <h1>🏆 Honey Launchpad Leaderboard</h1>
  <p style="color:#666; margin-bottom:20px;">Top HONEY holders by balance • Investor Tier shown</p>

  <div class="card">
    <table id="leaderboardTable">
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Wallet</th>
          <th>HONEY</th>
          <th>Tier</th>
          <th>NFTs</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <!-- Filled by JavaScript -->
      </tbody>
    </table>
  </div>

  <button onclick="loadLeaderboard()" style="width:100%; padding:14px;">🔄 Refresh Leaderboard</button>

  <p style="text-align:center; margin-top:30px; color:#888; font-size:0.9em;">
    Only wallets that have interacted with the protocol are shown.<br>
    The game is just beginning.
  </p>
</body>
</html>
