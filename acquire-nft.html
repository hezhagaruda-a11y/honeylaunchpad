<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey Launchpad • Acquire Investor NFT</title>
  <script type="module" src="acquire-nft.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --card-bg: white;
      --text: #111;
      --accent: #4caf50;
    }
    [data-theme="dark"] {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --text: #f0f0f0;
      --accent: #4caf50;
    }
    body { 
      font-family: Arial; 
      background: var(--bg);
      background-image: 
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(60deg, rgba(255,193,7,0.09) 25%, transparent 25%),
        linear-gradient(120deg, rgba(255,193,7,0.09) 25%, transparent 25%);
      background-size: 58px 33px;
      color: var(--text); 
      padding: 20px; 
      max-width: 700px; 
      margin: auto; 
      transition: background 0.3s;
    }
    .card { 
      background: var(--card-bg); 
      padding: 20px; 
      margin-top: 20px; 
      border-radius: 12px; 
      box-shadow: 0 3px 10px rgba(0,0,0,0.08); 
      border: 1px solid #ddd;
    }
    [data-theme="dark"] .card {
      border: 1px solid #333;
    }
    button { 
      padding: 14px 20px; 
      border: none; 
      background: #111; 
      color: white; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px;
      min-height: 48px;
    }
    [data-theme="dark"] button {
      background: white;
      color: #111;
    }
    .theme-toggle {
      padding: 10px 12px;
      font-size: 22px;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: white;
      box-shadow: 0 0 12px #4fc3f7;
    }
    [data-theme="dark"] .theme-toggle {
      background: white;
      color: #111;
      box-shadow: 0 0 12px #4fc3f7;
    }
    .price {
      font-size: 1.1em;
      font-weight: bold;
      color: var(--accent);
    }
    .balance {
      font-size: 0.95em;
      color: #666;
      margin-top: 8px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <!-- Dark Mode Toggle -->
  <div style="position: fixed; top: 15px; right: 15px; z-index: 100;">
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>

  <h2>🍯 Acquire Investor NFT</h2>

  <div class="card">
    <button id="connectBtn" style="width:100%;">Connect Wallet</button>
    <p id="wallet" style="margin-top:10px; font-size:0.9em;"></p>
    <p id="honeyBalance" class="balance">HONEY Balance: Loading...</p>
    <p id="currentTier" class="balance" style="margin-top:4px; font-weight:bold; color:#4caf50;"></p>
  </div>

  <div class="card">
    <h3>Current Honey Price (Simulated Spark DEX Pool)</h3>
    <p id="honeyPriceDisplay">Loading live price...</p>
    <button onclick="buyHoneyOnDex()" style="background:#4caf50; width:100%; margin-top:10px;">Buy HONEY on Spark DEX</button>
  </div>

  <div class="card">
    <h3>Bronze Tier</h3>
    <p>300 USDC equivalent</p>
    <p id="bronzeHONEY" class="price">Loading...</p>
    <button onclick="mintTier(1)">Mint Bronze</button>
  </div>

  <div class="card">
    <h3>Silver Tier</h3>
    <p>1,000 USDC equivalent</p>
    <p id="silverHONEY" class="price">Loading...</p>
    <button onclick="mintTier(2)">Mint Silver</button>
  </div>

  <div class="card">
    <h3>Gold Tier</h3>
    <p>5,000 USDC equivalent</p>
    <p id="goldHONEY" class="price">Loading...</p>
    <button onclick="mintTier(3)">Mint Gold</button>
  </div>

  <!-- Success Popup -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <h2 style="color:#4caf50;">🎉 Congratulations!</h2>
      <p id="successText" style="font-size:1.1em; line-height:1.6; margin:20px 0;"></p>
      <button onclick="document.getElementById('successModal').style.display='none'" 
              style="background:#4caf50; width:100%;">Continue to Dashboard</button>
    </div>
  </div>

  <p id="status"></p>

  <script>
    document.getElementById("themeToggle").onclick = () => {
      const current = document.documentElement.getAttribute("data-theme") || "light";
      const newTheme = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", newTheme);
      localStorage.setItem("theme", newTheme);
    };
  </script>
</body>
</html>
